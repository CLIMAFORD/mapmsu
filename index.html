        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        <script src="js/app.js"></script>
        <script>
        // --- Search utility: searches feature properties across all qgis2web layers ---
        (function(){
            function getDeclaredLayers(){
                var names = [
                    'layer_MSUPolygonFacilities_1','layer_collegecampus_2','layer_siriba_3','layer_niles_4',
                    'layer_grass_5','layer_coated_6','layer_farm_7','layer_field_8','layer_flowers_9',
                    'layer_amenity_10','layer_buildings_11','layer_trees_12'
                ];
                return names.map(n=>window[n]).filter(Boolean);
            }

            function featureString(feature){
                var vals = [];
                for(var k in feature.properties){
                    try{ if(feature.properties[k] != null) vals.push(String(feature.properties[k])); }catch(e){}
                }
                return vals.join(' ').toLowerCase();
            }

            function boundsForFeature(feature){
                var gj = L.geoJSON(feature);
                try{ return gj.getBounds(); }catch(e){
                    var coords = (feature.geometry && feature.geometry.coordinates) || null;
                    if(coords && coords.length>=2) return L.latLngBounds([coords[1],coords[0]]);
                }
                return null;
            }

            function renderResultItem(item){
                var div = document.createElement('div');
                div.className = 'px-3 py-2 hover:bg-slate-100 cursor-pointer text-sm';
                div.textContent = item.preview;
                div.addEventListener('click', function(){
                    if(item.bounds && item.bounds.isValid()) map.fitBounds(item.bounds.pad(1.2));
                    else if(item.center) map.setView(item.center, 18);
                    var popup = L.popup({maxWidth:400}).setLatLng(item.center || item.bounds.getCenter())
                        .setContent(item.preview).openOn(map);
                });
                return div;
            }

            function doSearch(){
                var q = (document.getElementById('mapSearch')||{}).value || '';
                var mode = (document.getElementById('searchMode')||{}).value || 'any';
                var resultsContainer = document.getElementById('searchResults');
                resultsContainer.innerHTML = '';
                if(!q.trim()) return;
                var terms = q.toLowerCase().trim().split(/\s+/);
                var layers = getDeclaredLayers();
                var matches = [];
                layers.forEach(function(layer){
                    try{
                        var geo = layer.toGeoJSON();
                        (geo.features||[]).forEach(function(f){
                            var s = featureString(f);
                            var found = terms.map(t=> s.indexOf(t) !== -1 );
                            var ok = (mode === 'all') ? found.every(Boolean) : found.some(Boolean);
                            if(ok){
                                var b = boundsForFeature(f);
                                var center = b && b.isValid() ? b.getCenter() : (f.geometry && f.geometry.type === 'Point' ? L.latLng(f.geometry.coordinates[1], f.geometry.coordinates[0]) : null);
                                matches.push({feature:f, bounds:b, center:center, preview: (f.properties && (f.properties.Name || f.properties.name || f.properties.ID || Object.values(f.properties).slice(0,3).join(' '))) || 'Feature'});
                            }
                        });
                    }catch(e){ console.warn('search layer', e); }
                });
                if(matches.length === 0){ resultsContainer.textContent = 'No results'; return; }
                matches.slice(0,50).forEach(function(m){ resultsContainer.appendChild(renderResultItem(m)); });
            }

            // Inject results container next to controls
            var results = document.createElement('div');
            results.id = 'searchResults';
            results.className = 'fixed left-4 bottom-20 w-80 max-h-64 overflow-auto bg-white rounded shadow-md';
            document.body.appendChild(results);

            var searchBtn = document.getElementById('searchBtn');
            if(searchBtn) searchBtn.addEventListener('click', doSearch);
            var searchInput = document.getElementById('mapSearch');
            if(searchInput) searchInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') doSearch(); });
        })();
        </script>
